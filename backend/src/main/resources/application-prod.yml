# 프로덕션 환경 설정 (AWS RDS 연결)
spring:
  datasource:
    # AWS RDS 프로덕션 서버 연결 설정
    url: ${AWS_PROD_DB_URL}
    username: ${AWS_PROD_DB_USERNAME}
    password: ${AWS_PROD_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

    # 프로덕션 환경 커넥션 풀 설정 (높은 성능)
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-timeout: 30000
      validation-timeout: 5000
      leak-detection-threshold: 60000
      # 프로덕션 최적화
      cache-prep-stmts: true
      prep-stmt-cache-size: 250
      prep-stmt-cache-sql-limit: 2048
      use-server-prep-stmts: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false  # 프로덕션: 이미 초기화된 DB에서 baseline 생략

  jpa:
    hibernate:
      ddl-auto: validate  # 프로덕션에서는 validate 사용 (스키마 자동 변경 금지)
    open-in-view: false   # 성능을 위해 비활성화
    show-sql: false       # 프로덕션에서는 SQL 로그 비활성화
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect
        # 프로덕션 최적화
        connection:
          provider_disables_autocommit: true
        jdbc:
          batch_size: 50
          fetch_size: 100
          order_inserts: true
          order_updates: true

# 프로덕션 환경 모니터링 설정 (보안 강화 — 최소 노출)
management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: never  # 프로덕션에서는 내부 정보 숨김
  metrics:
    export:
      enabled: true

# API JWT 설정 (HMAC-SHA256) — JWT_SECRET 은 반드시 .env.prod 에서 주입
app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

# CORS 설정 — 프로덕션 도메인을 .env.prod 의 CORS_ALLOWED_ORIGINS 에 명시
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://your-domain.com}

# 프로덕션 환경 로깅 (최소한의 로그, 파일 출력)
logging:
  level:
    root: ${LOGGING_LEVEL_ROOT:WARN}
    org.springframework.security: WARN
    com.example.wordle: INFO
    org.hibernate: WARN
    org.springframework.web: WARN
    com.zaxxer.hikari: WARN
  file:
    name: /var/log/wordle/application.log
    max-size: 10MB
    max-history: 30
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
